<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyan Dứa- PACs</title>
    <style>
        :root {
            --bg-color: #121212;
            --bar-bg: #1e1e1e;
            --accent-color: #ff9800;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --border-radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* Ngăn bôi đen văn bản trên toàn trang */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--bar-bg);
            border-bottom: 1px solid #333;
            z-index: 100;
            position: relative;
        }

        /* Thanh tiến trình tải ảnh mượt mà */
        .loading-container {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: transparent;
            z-index: 101;
            display: none;
        }
        .loading-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.1s ease-out;
            box-shadow: 0 0 5px var(--accent-color);
        }

        /* Khu vực bên trái chứa Logo và Nút chọn bệnh nhân */
        .top-left-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* CSS cho Logo trường */
        .school-logo {
            height: 36px;
            width: auto;
            border-radius: 4px;
            object-fit: contain;
            pointer-events: none; /* Ngăn kéo thả logo */
        }

        .patient-selector { display: flex; align-items: center; gap: 10px; }
        .patient-selector select {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .patient-info-basic { display: flex; align-items: center; gap: 20px; }
        .patient-info-basic span { font-size: 14px; color: var(--text-secondary); }
        .btn-more-info {
            background-color: #333;
            color: var(--text-color);
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-more-info:hover { background-color: #444; }

        .patient-details-panel {
            background-color: var(--bar-bg);
            border-bottom: 1px solid #333;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            max-height: 0;
        }
        .patient-details-panel.open { max-height: 500px; overflow-y: auto; }
        .details-content { padding: 20px; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        .details-content h4 { color: var(--text-color); margin-bottom: 10px; margin-top: 15px; }
        .details-content h4:first-child { margin-top: 0; }
        .details-content ul { margin-left: 20px; margin-top: 5px; }

        .series-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            padding: 15px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
            overflow-x: auto;
            white-space: nowrap;
        }

        .series-thumbnail {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
            border: 2px solid transparent;
            border-radius: var(--border-radius);
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .series-thumbnail:hover { transform: translateY(-3px); border-color: #555; }
        .series-thumbnail.active { border-color: var(--accent-color); }

        .thumbnail-img-box {
            width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        .series-thumbnail img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            pointer-events: none;
        }

        .series-thumbnail span {
            font-size: 11px;
            text-align: center;
            color: #ddd;
            padding: 5px;
            width: 100%;
            display: block;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .viewer-main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            position: relative;
            cursor: grab;
            overflow: hidden;
        }
        .viewer-main:active { cursor: grabbing; }

        #main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        /* ----- WATERMARK ĐÓNG DẤU CHÌM ----- */
        .watermark {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }

        .slice-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 16px;
            color: #00ff00;
            background-color: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }

        .viewer-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 30px;
            cursor: pointer;
            transition: color 0.2s;
            display: none;
            z-index: 20;
        }
        .viewer-main:hover .viewer-nav { display: block; }
        .viewer-nav:hover { color: var(--accent-color); }
        .viewer-prev { left: 20px; }
        .viewer-next { right: 20px; }

        /* Chữ ký bản quyền Footer */
        .footer-copyright {
            background-color: #0a0a0a;
            color: #555;
            text-align: center;
            font-size: 11px;
            padding: 8px 0;
            letter-spacing: 1px;
            border-top: 1px solid #1a1a1a;
            text-transform: uppercase;
        }
    </style>
</head>

                            "https://prod-images-static.radiopaedia.org/images/71637566/3e4faf5252f59870d8c1237ce4f12d3215b48a3a5533b53f6e52523240765837.png",
                            "https://prod-images-static.radiopaedia.org/images/71637567/e042ca9902ac04c6a55d72111a7e94dc7894e8bfe0ebae046b66400ed98a1411.png",
                            "https://prod-images-static.radiopaedia.org/images/71637569/05f267d0c31892d491f14838ad8e1c3d429eda3d4baaf8b5485ff47bb87ad150.png",
                            "https://prod-images-static.radiopaedia.org/images/71637570/85aabef0f80e79a04b0773f2ecdf40e9006b08a7499aec5d5bf01627d016a3a7.png",
                            "https://prod-images-static.radiopaedia.org/images/71637571/5a0b68638c58796ee50380a084ea1164a5aa43a6f7d00a26287447bf628f2ee4.png",
                            "https://prod-images-static.radiopaedia.org/images/71637572/e90124fc056978ed7b68e01362456e4f57a34f633ff09d7133854c79fdf447c7.png",
                            "https://prod-images-static.radiopaedia.org/images/71637574/81c81c8520fff070a0a1368881e7c6dd7dfec9cb82fb1d7b5aa2bb1a4bf5f721.png",
                            "https://prod-images-static.radiopaedia.org/images/71637575/fb6021ee83f88517efe6327cd41716e4d2698c5d0cf5608c20ac9966e3a86097.png",
                            "https://prod-images-static.radiopaedia.org/images/71637576/56e0a26d24d763c39e32e518d200e6af5fbe2ed2d6becd430bd9bdb4051a6953.png",
                            "https://prod-images-static.radiopaedia.org/images/71637577/11f73351eae3018a1d91c31798b5c90f2b498540f66f94cf4bc52696cb52b9ae.png"
                        ]
                    }
                }
            }
        };

        let currentPatientId = "patient1";
        let currentSeriesId = "";
        let currentImageIndex = 0;
        let imagesArray = [];
        let preloadCache = [];
        let currentPreloadId = 0;

        const mainImage = document.getElementById('main-image');
        const sliceCounter = document.getElementById('slice-counter');
        const viewerArea = document.getElementById('viewer-area');
        const thumbnailContainer = document.getElementById('thumbnail-container');
        const patientAgeGender = document.getElementById('patient-age-gender');
        const patientDetailsPanel = document.getElementById('patient-details-panel');
        const patientDetailsContent = document.getElementById('patient-details-content');
        const toggleDetailsBtn = document.getElementById('toggle-details-btn');
        const loadingContainer = document.getElementById('loading-container');
        const loadingBar = document.getElementById('loading-bar');

        function changePatient(patientId) {
            currentPatientId = patientId;
            const patient = database[patientId];
            
            patientAgeGender.innerText = `${patient.name} | Giới tính: ${patient.gender} | Tuổi: ${patient.age}`;
            
            if (patientDetailsPanel.classList.contains('open')) {
                togglePatientDetails();
            }
            
            thumbnailContainer.innerHTML = '';
            const seriesKeys = Object.keys(patient.series);
            
            seriesKeys.forEach(seriesId => {
                const seriesData = patient.series[seriesId];
                const div = document.createElement('div');
                div.className = `series-thumbnail`;
                div.id = `thumb-${seriesId}`;
                div.onclick = () => loadSeries(seriesId);
                div.innerHTML = `
                    <div class="thumbnail-img-box"><img src="${seriesData.thumb}" alt="${seriesData.name}"></div>
                    <span>${seriesData.name}</span>
                `;
                thumbnailContainer.appendChild(div);
            });

            if (seriesKeys.length > 0) {
                loadSeries(seriesKeys[0]);
            } else {
                imagesArray = [];
                updateImage();
            }
        }

        function preloadSeriesImages() {
            currentPreloadId++;
            const myPreloadId = currentPreloadId;
            preloadCache = [];
            
            if (!imagesArray || imagesArray.length === 0) {
                loadingContainer.style.display = 'none';
                return;
            }

            loadingContainer.style.display = 'block';
            loadingBar.style.width = '0%';
            
            let loadedCount = 0;
            const total = imagesArray.length;

            imagesArray.forEach((src) => {
                const img = new Image();
                img.onload = img.onerror = () => {
                    if (myPreloadId !== currentPreloadId) return;
                    
                    loadedCount++;
                    loadingBar.style.width = `${(loadedCount / total) * 100}%`;
                    
                    if (loadedCount === total) {
                        setTimeout(() => { 
                            if (myPreloadId === currentPreloadId) loadingContainer.style.display = 'none'; 
                        }, 300);
                    }
                };
                img.src = src;
                preloadCache.push(img);
            });
        }

        function loadSeries(seriesId) {
            currentSeriesId = seriesId;
            imagesArray = database[currentPatientId].series[seriesId].images;
            currentImageIndex = 0;

            document.querySelectorAll('.series-thumbnail').forEach(el => el.classList.remove('active'));
            const activeThumb = document.getElementById(`thumb-${seriesId}`);
            if(activeThumb) activeThumb.classList.add('active');

            updateImage();
            preloadSeriesImages();
        }

        function updateImage() {
            if (imagesArray.length > 0) {
                mainImage.src = imagesArray[currentImageIndex];
                sliceCounter.innerText = `Lát cắt: ${currentImageIndex + 1} / ${imagesArray.length}`;
            } else {
                mainImage.src = "https://via.placeholder.com/800x600/000/333?text=Chua+co+du+lieu+anh";
                sliceCounter.innerText = `Lát cắt: 0 / 0`;
            }
        }

        function togglePatientDetails() {
            const patient = database[currentPatientId];
            patientDetailsContent.innerHTML = patient.description;
            
            if (patientDetailsPanel.classList.contains('open')) {
                patientDetailsPanel.classList.remove('open');
                toggleDetailsBtn.innerText = "Xem thêm thông tin";
            } else {
                patientDetailsPanel.classList.add('open');
                toggleDetailsBtn.innerText = "Đóng thông tin";
            }
        }

        function changeSlice(direction) {
            if (direction === 'next' && currentImageIndex < imagesArray.length - 1) {
                currentImageIndex++;
                updateImage();
            } else if (direction === 'prev' && currentImageIndex > 0) {
                currentImageIndex--;
                updateImage();
            }
        }

        viewerArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            changeSlice(e.deltaY > 0 ? 'next' : 'prev');
        });

        let startY = 0, isDragging = false;
        const dragSensitivity = 10;

        viewerArea.addEventListener('mousedown', (e) => { isDragging = true; startY = e.clientY; });
        window.addEventListener('mouseup', () => { isDragging = false; });
        viewerArea.addEventListener('mouseleave', () => { isDragging = false; });
        
        viewerArea.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let diff = startY - e.clientY;
            let slicesToMove = Math.floor(diff / dragSensitivity);
            
            if (slicesToMove !== 0) {
                if (slicesToMove > 0) {
                    for(let i=0; i<slicesToMove; i++) changeSlice('next');
                } else {
                    for(let i=0; i<Math.abs(slicesToMove); i++) changeSlice('prev');
                }
                startY -= slicesToMove * dragSensitivity; 
            }
        });

        let touchStartY = 0;
        viewerArea.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: false });
        viewerArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            let diff = touchStartY - e.touches[0].clientY;
            let slicesToMove = Math.floor(diff / dragSensitivity);
            
            if (slicesToMove !== 0) {
                if (slicesToMove > 0) {
                    for(let i=0; i<slicesToMove; i++) changeSlice('next');
                } else {
                    for(let i=0; i<Math.abs(slicesToMove); i++) changeSlice('prev');
                }
                touchStartY -= slicesToMove * dragSensitivity;
            }
        }, { passive: false });

        changePatient(currentPatientId);

    </script>
</body>
</html>
