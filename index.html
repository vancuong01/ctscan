        body {

            display: flex; flex-direction: column; align-items: center;

        }
        
        .header {
            width: 100%; background: #1a1a1a; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 10px 20px; box-sizing: border-box; border-bottom: 1px solid #333;
        }
        .tabs button {
            background: #333; color: #aaa; border: none; padding: 10px 20px;
            margin-right: 5px; cursor: pointer; border-radius: 4px 4px 0 0;
            font-size: 14px; font-weight: bold; transition: 0.2s;
        }
        .tabs button.active { background: #4CAF50; color: #fff; }
        
        /* Cụm thông tin và nút mô tả bên phải header */
        .header-right {
            display: flex; align-items: center; gap: 15px;
        }
        .patient-info {
            font-size: 14px; color: #4CAF50; font-weight: bold;
            background: rgba(76, 175, 80, 0.1); padding: 8px 15px; border-radius: 4px;
        }
        .desc-btn {
            background: #2196F3; color: white; border: none; padding: 8px 15px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;
            transition: 0.2s;
        }
        .desc-btn:hover { background: #0b7dda; }

        .workspace {
            display: flex; width: 100%; height: calc(100vh - 120px);
            padding: 10px; box-sizing: border-box; gap: 10px;
        }
        
        .viewer-box {
            flex: 1; background: #0a0a0a; border: 2px solid #333; 
            position: relative; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.2s;
        }
        .viewer-box.active {
            border: 2px solid #4CAF50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }

        .window-title {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
            padding: 5px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; z-index: 10;
        }
        .slice-info {
            position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7);
            padding: 5px 10px; border-radius: 4px; font-size: 14px; color: #00e5ff; z-index: 10;
        }
        .viewer-box img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .placeholder-text { color: #555; font-size: 14px; font-style: italic; text-align: center; }

        #loading-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 50; display: none;
        }
        .progress-bar { width: 300px; height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: #4CAF50; width: 0%; transition: width 0.1s; }

        .controls {
            width: 100%; padding: 10px 20px; background: #111; 
            display: flex; justify-content: center; align-items: center; box-sizing: border-box;
        }
        input[type="range"] { width: 100%; max-width: 800px; cursor: pointer; }

        /* --- CSS CHO CỬA SỔ MÔ TẢ (MODAL) --- */
        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background-color: #1a1a1a; padding: 20px 30px; border: 1px solid #4CAF50;
            width: 80%; max-width: 600px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative; line-height: 1.6;
        }
        .modal-content h2 { margin-top: 0; color: #4CAF50; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .close-btn {
            color: #aaa; position: absolute; top: 15px; right: 20px;

cdf40e9006b08a7499aec5d5bf01627d016a3a7.png", "https://prod-images-static.radiopaedia.org/images/71637571/5a0b68638c58796ee50380a084ea1164a5aa43a6f7d00a26287447bf628f2ee4.png", "https://prod-images-static.radiopaedia.org/images/71637572/e90124fc056978ed7b68e01362456e4f57a34f633ff09d7133854c79fdf447c7.png", "https://prod-images-static.radiopaedia.org/images/71637574/81c81c8520fff070a0a1368881e7c6dd7dfec9cb82fb1d7b5aa2bb1a4bf5f721.png", "https://prod-images-static.radiopaedia.org/images/71637575/fb6021ee83f88517efe6327cd41716e4d2698c5d0cf5608c20ac9966e3a86097.png", "https://prod-images-static.radiopaedia.org/images/71637576/56e0a26d24d763c39e32e518d200e6af5fbe2ed2d6becd430bd9bdb4051a6953.png", "https://prod-images-static.radiopaedia.org/images/71637577/11f73351eae3018a1d91c31798b5c90f2b498540f66f94cf4bc52696cb52b9ae.png"
                ]
            }
        };

        let currentPatientId = 1;
        let slices = { bone: 0, parenchyma: 0 };
        let totalSlices = { bone: 0, parenchyma: 0 };
        let activePane = 'bone'; 

        let preloadedImages = { bone: [], parenchyma: [] };
        const slider = document.getElementById('slice-slider');

        // --- HÀM MỞ/ĐÓNG MÔ TẢ ---
        function openDescription() {
            const data = database[currentPatientId];
            document.getElementById('modal-patient-id').textContent = currentPatientId;
            document.getElementById('modal-desc-text').innerHTML = data.description || "Chưa có thông tin mô tả cho bệnh nhân này.";
            document.getElementById('desc-modal').style.display = 'flex';
        }

        function closeDescription() {
            document.getElementById('desc-modal').style.display = 'none';
        }

        // Bấm ra ngoài cửa sổ để đóng
        window.onclick = function(event) {
            const modal = document.getElementById('desc-modal');
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }

        // --- CÁC HÀM XỬ LÝ ẢNH ---
        function setActivePane(pane) {
            activePane = pane;
            document.getElementById('box-bone').classList.toggle('active', pane === 'bone');
            document.getElementById('box-parenchyma').classList.toggle('active', pane === 'parenchyma');
            
            if (totalSlices[pane] > 0) {
                slider.disabled = false;
                slider.max = totalSlices[pane];
                slider.value = slices[pane] + 1;
            } else {
                slider.disabled = true;
                slider.value = 1;
            }
        }

        function loadPatient(patientId) {
            document.querySelectorAll('.tabs button').forEach((btn, idx) => {
                btn.className = (idx + 1 === patientId) ? 'active' : '';
            });

            currentPatientId = patientId;
            const data = database[patientId];
            document.getElementById('patient-info').textContent = data.info;

            slices = { bone: 0, parenchyma: 0 };
            totalSlices.bone = data.boneLinks.length;
            totalSlices.parenchyma = data.parenchymaLinks.length;

            document.getElementById('total-bone').textContent = totalSlices.bone;
            document.getElementById('total-parenchyma').textContent = totalSlices.parenchyma;

            if (totalSlices.bone === 0 && totalSlices.parenchyma === 0) {
                resetViewer();
                return;
            }

            document.getElementById('loading-screen').style.display = 'flex';
            document.getElementById('progress-fill').style.width = '0%';
            slider.disabled = true;
            
            preloadData(data);
        }

        function preloadData(data) {
            let loaded = 0;
            const totalToLoad = totalSlices.bone + totalSlices.parenchyma;
            preloadedImages = { bone: [], parenchyma: [] };

            const checkDone = () => {
                loaded++;
                document.getElementById('progress-fill').style.width = `${(loaded / totalToLoad) * 100}%`;
                if (loaded === totalToLoad) {
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        if(totalSlices.bone > 0) updateImage('bone', 0);
                        else showPlaceholder('bone');
                        if(totalSlices.parenchyma > 0) updateImage('parenchyma', 0);
                        else showPlaceholder('parenchyma');
                        setActivePane('bone');
                    }, 300);
                }
            };

            data.boneLinks.forEach((link, i) => {
                const img = new Image();
                img.onload = checkDone; img.onerror = checkDone;
                img.src = link;
                preloadedImages.bone[i] = img;
            });

            data.parenchymaLinks.forEach((link, i) => {
                const img = new Image();
                img.onload = checkDone; img.onerror = checkDone;
                img.src = link;
                preloadedImages.parenchyma[i] = img;
            });
        }

        function updateImage(pane, index) {
            if (totalSlices[pane] === 0) return;
            if (index < 0) index = 0;
            if (index >= totalSlices[pane]) index = totalSlices[pane] - 1;
            
            slices[pane] = index;
            document.getElementById(`img-${pane}`).style.display = 'block';
            document.getElementById(`ph-${pane}`).style.display = 'none';
            document.getElementById(`img-${pane}`).src = preloadedImages[pane][index].src;
            document.getElementById(`slice-${pane}`).textContent = index + 1;

            if (activePane === pane) {
                slider.value = index + 1;
            }
        }

        function showPlaceholder(pane) {
            document.getElementById(`img-${pane}`).style.display = 'none';
            document.getElementById(`ph-${pane}`).style.display = 'block';
            document.getElementById(`ph-${pane}`).textContent = "Chưa có link ảnh";
        }

        function resetViewer() {
            showPlaceholder('bone');
            showPlaceholder('parenchyma');
            document.getElementById('slice-bone').textContent = "0";
            document.getElementById('slice-parenchyma').textContent = "0";
            slider.disabled = true;
        }

        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) updateImage(activePane, slices[activePane] + 1);
            else updateImage(activePane, slices[activePane] - 1);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); updateImage(activePane, slices[activePane] - 1); }
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); updateImage(activePane, slices[activePane] + 1); }
        });

        slider.addEventListener('input', (e) => {
            updateImage(activePane, parseInt(e.target.value) - 1);
        });

        loadPatient(1);
    </script>
</body>
</html>
